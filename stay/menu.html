<!doctype html>

        <a data-menu-type-link="non-coffee" href="menu.html?type=non-coffee">NON-COFFEE</a>

      <nav class="menu-secondary-nav" aria-label="도움말">

    <dialog id="itemDialog" class="menu-detail-dialog">
      <form method="dialog">
        <div class="detail-titlebar">
          <h2 id="detailTitle"></h2>
          <button type="button" id="detailCloseButton" aria-label="닫기">×</button>
        </div>
        <div id="detailBody" class="detail-body"></div>
